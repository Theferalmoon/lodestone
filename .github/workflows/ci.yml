# SPDX-License-Identifier: Apache-2.0
#
# Lodestone CI — pnpm + node 20 build/typecheck/test matrix with a
# dedicated privacy-audit step that enforces the §18 "no outbound URLs
# in shipped dist/" claim as a CI gate.
#
# The privacy audit is the proof-by-build for the docs/PRIVACY.md
# promise: "your code never leaves your machine". Anything in the
# compiled dist/ that contacts a URL not on `network-manifest.json`
# fails the build.
#
# Coverage thresholds (75/75/70/75 lines/functions/branches/statements,
# enforced per-package by each `vitest.config.ts`) ride along inside
# `pnpm -r test`; v8 coverage exits non-zero on regression and the
# workflow surfaces that failure naturally.
#
# Compliance: NIST 800-53 SC-7 (boundary protection), SA-12 (supply
# chain protection), CM-7 (least functionality), CA-7 (continuous
# monitoring); SOC 2 CC6.6, CC7.2; CMMC L2 SC.L2-3.13.5,
# SI.L2-3.14.1; ISO 27001 A.13.1.1, A.12.1.2; FedRAMP Moderate
# SC-7, SI-7.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: build / typecheck / test (${{ matrix.os }}, node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        node: [20]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Enable corepack + activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
          pnpm --version

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Audit (high+critical only)
        run: pnpm audit --audit-level=high
        continue-on-error: true
        # Audit findings are surfaced in the log but do not fail the
        # build — known-issue triage is documented in
        # docs/KNOWN-ISSUES.md. Flip to `continue-on-error: false`
        # once the embedder transitive CVE is upstreamed.

      - name: Build (all packages)
        run: pnpm -r build

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Test (all packages, with coverage thresholds)
        # Per-package vitest.config.ts enforces 75/75/70/75 coverage
        # thresholds. Regression exits non-zero here.
        run: pnpm test

      # === §18 privacy gate ===
      # Dedicated step so the privacy claim has a named, visible CI
      # check. The same audit also runs inside `pnpm test` above (it's
      # one of the vitest suites in @lodestone/shared) — running it
      # explicitly here means a green/red badge tied to the privacy
      # promise, and it picks up the just-built dist/ from the previous
      # step. If anything in dist/ contacts a URL not on
      # network-manifest.json, this step fails the build.
      - name: Privacy audit — no outbound URLs in dist/
        working-directory: packages/shared
        run: pnpm vitest run no-outbound-urls

      # Upload coverage + lockfile so a failed run is debuggable
      # without re-running locally.
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-node${{ matrix.node }}
          path: |
            packages/*/coverage/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload pnpm-lock.yaml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-lock-${{ matrix.os }}-node${{ matrix.node }}
          path: pnpm-lock.yaml
          if-no-files-found: ignore
          retention-days: 7
